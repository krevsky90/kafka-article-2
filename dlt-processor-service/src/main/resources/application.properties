# Core application configuration
spring.application.name=dlt-processor-service
server.port=8084

# Kafka properties
spring.kafka.bootstrap-servers=localhost:29092,localhost:29093,localhost:29094
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# because DefaultErrorHandler sends all messages as BASE64 string
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.group-id=dltProcessorService
spring.kafka.consumer.auto-offset-reset=latest

spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record

# for Utilization metrics (tomcat_threads_busy_threads, tomcat_threads_current_threads, tomcat_threads_config_max_threads)
management.metrics.enable.tomcat=true
server.tomcat.mbeanregistry.enabled=true

