# set 8080 port for all services in docker
server.port=8080
# best practice is to use separate port for actuator, but not server.port (8080)
management.server.port=9001

# Postgres properties
# note: here is internal docker port of notification-postgres (i.e. 5432 by default)
spring.datasource.url=jdbc:postgresql://notification-postgres:5432/notification_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Kafka properties
spring.kafka.bootstrap-servers=kafka-0:9091,kafka-1:9091,kafka-2:9091
# set path to schema registry for our Avro-serializer (take internal port of schema-registry from docker-compose file)
spring.kafka.consumer.properties.schema.registry.url=http://schema-registry:8081