# Postgres properties
# note: here is internal docker port of notification-postgres (i.e. 5432 by default)
spring.datasource.url=jdbc:postgresql://notification-postgres:5432/notification_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Kafka properties
spring.kafka.bootstrap-servers=kafka-0:9091,kafka-1:9091,kafka-2:9091