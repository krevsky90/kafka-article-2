x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  kafka-0:
    # Будем использовать данный образ
    image: confluentinc/cp-kafka:8.1.0
    # Имя контейнера
    container_name: kafka-0
    # hostname контейнера
    hostname: kafka-0
    # Пробрасываем порты, чтоб слать в Kafka сообщения с хоста
    ports:
      - "29092:29092"
    environment:
      # Уникальный ID кластера в формате UUID
      # Можно сгенерировать через команду
      # docker run confluentinc/cp-kafka:8.1.0 kafka-storage random-uuid
      CLUSTER_ID: ZETVJENWRjaECDUEExP_eg
      # Уникальный ID ноды внутри кластера
      KAFKA_NODE_ID: 0
      # Нода и контроллер, и брокер
      KAFKA_PROCESS_ROLES: broker,controller
      # "Слушатели" используются для указания способа подключения к Kafka ноде,
      # То есть Kafka откроет порты и будет слушать на них подключения
      # В нашем случае первое слово - Alias, ://: - на всех сетевых интерфейсах,
      # Ну и в конце, очевидно, порт
      KAFKA_LISTENERS: INTERNAL://:9091,EXTERNAL://:29092,CONTROLLER://:9093
      # Перечисляем список нод, которые являются контроллерами в формате
      # [NodeID]@[Hostname]:[Port]
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093
      # Здесь мы указываем, куда Kafka будет "перенаправлять" клиента после того,
      # Как тот подключится к ней. Контроллер не указываем, так как это нужно
      # Только для внутренней работы Kafka
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-0:9091,EXTERNAL://localhost:29092
      # Настраиваем шифрование
      # В нашем случае PLAINTEXT означает его отсутствие
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      # Указываем, что для контроллера используется "Слушатель" CONTROLLER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Указываем, что для брокеров используется "Слушатель" INTERNAL
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

  kafka-1:
    image: confluentinc/cp-kafka:8.1.0
    container_name: kafka-1
    hostname: kafka-1
    ports:
      - "29093:29092"
    environment:
      CLUSTER_ID: ZETVJENWRjaECDUEExP_eg
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9091,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9091,EXTERNAL://localhost:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

  kafka-2:
    image: confluentinc/cp-kafka:8.1.0
    container_name: kafka-2
    hostname: kafka-2
    ports:
      - "29094:29092"
    environment:
      CLUSTER_ID: ZETVJENWRjaECDUEExP_eg
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9091,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:9091,EXTERNAL://localhost:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.0
    container_name: schema-registry
    hostname: schema-registry
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
    ports:
      - "8087:8081"
    environment:
      # Адреса нод кластера
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-0:9091,kafka-1:9091,kafka-2:9091
      # Имя хоста. когда будет выбрана master-нода в кластере schema-registry,
      # нода запишет в топик _schemas свой адрес http://schema-registry:8081
      # А если запрос придет к slave-ноде, то она перенаправит его на мастер-ноду на указанный адрес
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      # Слушаем на 8081 порту на всех сетевых интерфейсах
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    hostname: kafka-ui
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
      - schema-registry
    ports:
      - "8086:8080"
    environment:
      # Название кластера в веб-интерфейсе
      KAFKA_CLUSTERS_0_NAME: local
      # Указываем адреса наших брокеров в кластере
      # так как Kafka-UI и брокеры в одной Docker-сети, то используем порты 9091
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-0:9091,kafka-1:9091,kafka-2:9091
      # Настройка для динамической конфигурации брокеров через UI
      DYNAMIC_CONFIG_ENABLED: true
      # Указываем адрес реестра для того, чтобы Kafka-UI его подхватила
      # Это нужно для красивого отображения сообщений, ведь для того, чтобы
      # Получить схему, нам необходимо перейти в реестр
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  inventory-postgres:
    image: postgres:15
    container_name: inventory-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data # Монтируем именованный том
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  notification-postgres:
    image: postgres:15
    container_name: notification-postgres
    volumes:
      - pgdata_notification:/var/lib/postgresql/data # Монтируем именованный том
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  users-postgres:
    image: postgres:15
    container_name: users-postgres
    volumes:
      - pgdata_users:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  order-service:
    build: ./order-service
    container_name: order-service
    volumes:
      - ./monitoring/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: >
        -Xms512m
        -Xmx512m
        -Xss512k
        -XX:CompressedClassSpaceSize=64m
        -XX:MaxDirectMemorySize=32m
        -XX:NativeMemoryTracking=summary
        -XX:+UseG1GC
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=order-service
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
    # only for http://localhost:9001/actuator/prometheus
    ports:
      - "8081:8080"
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2"
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
      - otel-collector
    logging: *default-logging

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    volumes:
      - ./monitoring/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: >
        -Xms128m
        -Xmx256m
        -Xss512k
        -XX:CompressedClassSpaceSize=64m
        -XX:MaxDirectMemorySize=32m
        -XX:NativeMemoryTracking=summary
        -XX:+UseG1GC
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=inventory-service
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2"
    depends_on:
      - inventory-postgres
      - kafka-0
      - kafka-1
      - kafka-2
      - otel-collector
    logging: *default-logging

  notification-service:
    build: ./notification-service
    container_name: notification-service
    volumes:
      - ./monitoring/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      # Xss - Thread Stack Size. By default, it is 1 Mb for Tomcat's thread. but for usual CRUD app or Kafka consumer/producer it is ok to be 256k
      # -XX:+UseContainerSupport - optional for Java 10+. means JVM knows about container's limits (RAM, cpu)
      JAVA_TOOL_OPTIONS: >
        -Xms256m
        -Xmx256m
        -Xss512k
        -XX:CompressedClassSpaceSize=64m
        -XX:MaxDirectMemorySize=32m
        -XX:NativeMemoryTracking=summary
        -XX:+UseG1GC      
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=notification-service
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
    ports:
      # only for http://localhost:9002/actuator/prometheus
      - "9002:9001"
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2"
    depends_on:
      - notification-postgres
      - kafka-0
      - kafka-1
      - kafka-2
      - otel-collector
    logging: *default-logging

  krev-service:
    build: ./krev-service
    container_name: krev-service
    volumes:
      - ./monitoring/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: >
        -Xms256m
        -Xmx256m
        -Xss512k
        -XX:CompressedClassSpaceSize=64m
        -XX:MaxDirectMemorySize=32m
        -XX:NativeMemoryTracking=summary
        -XX:+UseG1GC
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=krev-service
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
      - otel-collector
    logging: *default-logging

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    volumes:
      - ./monitoring/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: >
        -Xms128m
        -Xmx256m
        -Xss512k
        -XX:CompressedClassSpaceSize=64m
        -XX:MaxDirectMemorySize=32m
        -XX:NativeMemoryTracking=summary
        -XX:+UseG1GC
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=analytics-service
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2"
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
      - otel-collector
    logging: *default-logging

  dlt-processor-service:
    build: ./dlt-processor-service
    container_name: dlt-processor-service
    volumes:
      - ./monitoring/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: >
        -Xms128m
        -Xmx256m
        -Xss512k
        -XX:CompressedClassSpaceSize=64m
        -XX:MaxDirectMemorySize=32m
        -XX:NativeMemoryTracking=summary
        -XX:+UseG1GC
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=dlt-processor-service
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
      - otel-collector
    logging: *default-logging

  user-service:
    build: ./user-service
    container_name: user-service
    volumes:
      - ./monitoring/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: >
        -Xms128m
        -Xmx256m
        -Xss512k
        -XX:CompressedClassSpaceSize=64m
        -XX:MaxDirectMemorySize=32m
        -XX:NativeMemoryTracking=summary
        -XX:+UseG1GC
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=user-service
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2"
    depends_on:
      - users-postgres
      - otel-collector
    logging: *default-logging

volumes:
  pgdata:  # Определение именованного тома
  pgdata_notification:
  pgdata_users: