# Core application configuration
spring.application.name=inventory-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/inventory_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Kafka properties
spring.kafka.bootstrap-servers=localhost:29092,localhost:29093,localhost:29094
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
# set path to schema registry for our Avro-serializer (take external port of schema-registry from docker-compose file)
spring.kafka.producer.properties.schema.registry.url=http://localhost:8087

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# handle errors of deserialization
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
# set deserializer that will work when ErrorHandlingDeserializer does not catch error of serialization
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=io.confluent.kafka.serializers.KafkaAvroDeserializer

spring.kafka.consumer.group-id=inventoryService
spring.kafka.consumer.auto-offset-reset=latest
# set path to schema registry for our Avro-serializer (take external port of schema-registry from docker-compose file)
spring.kafka.consumer.properties.schema.registry.url=http://localhost:8087
# to use generated record-classes for deserialization (otherwise serializer will return GenericRecord, not our Record classes that extends SpecificRecord)
spring.kafka.consumer.properties.specific.avro.reader=true 

# ADD PRODUCER IDEMPOTENCY
# 0   - at-most once
# 1   - at-least once
# all - at-least once, all is MANDATORY for idempotency!
spring.kafka.producer.acks=all
# based on ProducerId + ProducerEpoch (is incremented when producer is re-created) + sequenceNumber (number of message sent by this producer)
# if true => sets transactional.id - broker assigns unique ProducerId + ProducerEpoch to the producer
# example from logs:
# 2026-04-16T14:40:25.884Z " INFO [inventory-service]" 1 --- [inventory-service] [vice-producer-1] o.a.k.c.p.internals.TransactionManager   : [Producer clientId=inventory-service-producer-1] ProducerId set to 12000 with epoch 0
spring.kafka.producer.properties.enable.idempotence=true
# how many times producer sends message without getting ack. has to be > 0
spring.kafka.producer.retries=2147483647
# max amount of messages that producer can send before getting ack regarding some of these messages. needs to be <= 5
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# CONFIGURE COMMIT FOR OFFSET
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record

# metrics (publish endpoint)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
# provide access to published endpoint
management.endpoint.prometheus.access=read-only
# label to filter in Prometheus
management.metrics.tags.application=${spring.application.name}
# adds 'latency' metric for HTTP requests (NOTE: this is not necessary - it is included into Springboot)
management.metrics.web.server.auto-time-requests=true

# for Utilization metrics (tomcat_threads_busy_threads, tomcat_threads_current_threads, tomcat_threads_config_max_threads)
management.metrics.enable.tomcat=true
server.tomcat.mbeanregistry.enabled=true

# since Tomcat is used only as HTTP server to send metrics to Prometheus, set very low values to save RAM
# max amount of worker-threads
server.tomcat.threads.max=4
# min amount of worker-threads (always ready => when burst traffic happens Tomcat will not create a lot of threads)
server.tomcat.threads.min-spare=1
# TCP connections
server.tomcat.max-connections=16

# limit HirakiCP size looking at max amount of active threads in grafana during load testing
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1

### to use OpenTelemetry and jaeger to see traces in distributed system
# turn on Spring Boot 3 Micrometer Tracing (NOTE: usual value for production 0.1 .. 0.01)
management.tracing.sampling.probability=1
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces

### logging
# to save trace_id and span_id
logging.pattern.level: "%5p [${spring.application.name:},traceId=%X{trace_id:-},spanId=%X{span_id:-}]"
logging.level.root=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.level.io.mitochondria=DEBUG