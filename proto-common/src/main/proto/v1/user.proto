syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.mitochondria.grpc";

message UserRequest {
  string email = 1;
}

message UserResponse {
  string email = 1;
  string name = 2;
  int32 age = 3;
  string address = 4;
}

service UserInfoService {
  rpc GetUserInfo(UserRequest) returns (UserResponse);
}